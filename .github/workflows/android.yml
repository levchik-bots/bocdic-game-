name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    - name: Install System Dependencies
      run: sudo apt-get install -y libsqlite3-dev inputproto-dev libx11-dev libxext-dev libxfixes-dev libxi-dev libxrandr-dev libxrender-dev
    - name: Init Buildozer
      run: |
        buildozer init
        sed -i 's/^title =.*/title = БОГДИК ГЕМЕ/' buildozer.spec
        sed -i 's/^source.include_exts =.*/source.include_exts = py,png,jpg,kv,atlas/' buildozer.spec
    - name: Build APK
      run: buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: bogdik-game-apk
        path: bin/*.apk
