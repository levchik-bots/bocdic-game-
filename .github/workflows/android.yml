name: Build Pygame APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    # Запуск сборки в официальном готовом контейнере, где всё уже установлено
    container: kivy/buildozer:latest
    steps:
    - uses: actions/checkout@v4
    - name: Init and Configure Buildozer
      run: |
        buildozer init
        sed -i 's/^title =.*/title = БОГДИК ГЕМЕ/' buildozer.spec
        sed -i 's/^source.include_exts =.*/source.include_exts = py,png,jpg,kv,atlas/' buildozer.spec
        sed -i 's/^#icon.filename =.*/icon.filename = %(source.dir)s\/icon.png/' buildozer.spec
        sed -i 's/^requirements =.*/requirements = python3,pygame,pillow/' buildozer.spec
        sed -i 's/^#android.accept_licenses =.*/android.accept_licenses = True/' buildozer.spec
    - name: Build APK
      run: |
        buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: bogdik-game-apk
        path: bin/*.apk
