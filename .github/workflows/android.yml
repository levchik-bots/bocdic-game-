name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev libx11-dev libxext-dev libxfixes-dev libxi-dev libxrandr-dev libxrender-dev zip unzip xclip openjdk-17-jdk
    - name: Init Buildozer Config
      run: |
        buildozer init
        sed -i 's/^title =.*/title = БОГДИК ГЕМЕ/' buildozer.spec
        sed -i 's/^source.include_exts =.*/source.include_exts = py,png,jpg,kv,atlas/' buildozer.spec
        sed -i 's/^#icon.filename =.*/icon.filename = %(source.dir)s\/icon.png/' buildozer.spec
        sed -i 's/^#android.accept_licenses =.*/android.accept_licenses = True/' buildozer.spec
    - name: Accept Android Licenses Manually
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        wget https://google.com -O cmdline.zip
        unzip -q cmdline.zip -d cmdline
        mkdir -p sdk/cmdline-tools
        mv cmdline/cmdline-tools sdk/cmdline-tools/latest
        yes | sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/sdk --licenses || true
    - name: Build APK
      run: |
        export APP_ANDROID_ACCEPT_LICENSES=1
        buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: bogdik-game-apk
        path: bin/*.apk
